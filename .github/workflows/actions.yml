name: GitHub Actions
on: [push]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Check:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Java and Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          server-id: 'ossindex'
          server-username: OSS_INDEX_USERNAME
          server-password: OSS_INDEX_PASSWORD
      - name: Show Java and Maven versions
        shell: bash
        run: |
          java --version
          mvn --version
      - name: Run unit tests
        shell: bash
        run: |
          mvn test
      - name: Run OWASP dependency-check
        shell: bash
        run: |
          mvn -B -ntp -DnvdApiKey=${{ secrets.NVD_API_KEY }} -DnvdValidForHours=0 -DnvdApiDelay=5000 org.owasp:dependency-check-maven:check
      - name: Archive dependency check results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dependency-check
          path: target/dependency-check-report.html
          if-no-files-found: warn
